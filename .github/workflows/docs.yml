on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '*.rst'
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '["3.11"]'
      fail-fast:
        required: false
        type: boolean
        default: false
      ref:
        required: false
        type: string
        default: ${{ github.sha }}
      cache-path:
        required: false
        type: string
      cache-key:
        required: false
        type: string
      cache-restore-keys:
        required: false
        type: string

permissions:
  contents: read

jobs:
  docs:
    name: docs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: ${{ inputs.fail-fast || false }}
      matrix:
        python-version: ${{ fromJSON(inputs.python-version || '["3.11"]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || inputs.ref }}

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ inputs.cache-path || 'weights/' }}
          key: ${{ inputs.cache-key || format('model-weights-{0}', hashFiles('.github/download-models-weights.py')) }}
          restore-keys: ${{ inputs.cache-restore-keys || 'model-weights-' }}

      - name: Set pixi environment name
        id: pixi-env
        shell: bash
        run: echo "name=py$(echo '${{ matrix.python-version }}' | tr -d '.')" >> $GITHUB_OUTPUT

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.40.0
          cache: true
          environments: ${{ steps.pixi-env.outputs.name }}

      - name: Install environment
        run: pixi install -e ${{ steps.pixi-env.outputs.name }} --locked

      - name: Install docs dependencies
        run: pixi run -e ${{ steps.pixi-env.outputs.name }} install-docs

      - name: Download model weights safely before doctests
        run: pixi run uv run python .github/download-models-weights.py -t weights/ 2>/dev/null || true

      - name: Run doctest
        run: pixi run -e ${{ steps.pixi-env.outputs.name }} doctest

      - name: Build Documentation
        run: pixi run -e ${{ steps.pixi-env.outputs.name }} build-docs
